cache:
  host: localhost
  mode: default_off
  namespace: litellm.caching.caching
  port: 6379
  supported_call_types:
  - acompletion
  - atext_completion
  - aembedding
  - atranscription
  ttl: 600
  type: redis
general_settings:
  master_key: sk-5da6f943cb6443caac8a5dd5118ad4da
  alerting:
  - slack
  - email
  proxy_batch_write_at: 60
  database_connection_pool_limit: 10
  alerting_threshold: 0
  allow_requests_on_db_unavailable: true
  allowed_routes: []
  background_health_checks: true
  database_url: postgresql://postgres:None@localhost:5432/postgres
  disable_adding_master_key_hash_to_db: false
  disable_master_key_return: false
  disable_reset_budget: false
  disable_retry_on_max_parallel_request_limit_error: false
  disable_spend_logs: false
  enable_jwt_auth: false
  enforce_user_param: false
  global_max_parallel_requests: 0
  health_check_interval: 300
  infer_model_from_keys: true
  max_parallel_requests: 0
  use_client_credentials_pass_through_routes: false
litellm_settings:
  callbacks:
  - otel
  content_policy_fallbacks: []
  context_window_fallbacks: []
  default_fallbacks: []
  failure_callback:
  - sentry
  force_ipv4: true
  json_logs: true
  redact_user_api_key_info: true
  request_timeout: 600
  service_callbacks:
  - datadog
  - prometheus
  set_verbose: false
  turn_off_message_logging: false
model_list:
- model_name: kwaipilot/kat-coder-pro-v2
  litellm_params:
    model: openai/kwaipilot/kat-coder-pro-v2
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 3.0e-07
    output_cost_per_token: 1.2e-06
    max_input_tokens: 256000
    max_output_tokens: 80000
    metadata: &id001
      notes: KAT-Coder-Pro V2 is the latest high-performance model in KwaiKAT’s KAT-Coder
        series, designed for complex enterprise-grade software engineering and SaaS
        integration. It builds on the agentic coding strengths of earlier versions,
        with a focus on large-scale production environments, multi-system coordination,
        and seamless integration across modern software stacks, while also supporting
        web aesthetics generation to produce production-grade landing pages and presentation
        decks.
    litellm_provider: openrouter
    kwaipilot/kat-coder-pro-v2:
      input_cost_per_token: 3.0e-07
      output_cost_per_token: 1.2e-06
      max_input_tokens: 256000
      max_output_tokens: 80000
      metadata: *id001
      litellm_provider: openrouter
