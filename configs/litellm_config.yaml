      search_context_size_medium: 0.005
    supports_reasoning: true
    supports_web_search: true
    metadata: &id252
      notes: "Sonar Deep Research is a research-focused model designed for multi-step\
        \ retrieval, synthesis, and reasoning across complex topics. It autonomously\
        \ searches, reads, and evaluates sources, refining its approach as it gathers\
        \ information. This enables comprehensive report generation across domains\
        \ like finance, technology, health, and current events.\n\nNotes on Pricing\
        \ ([Source](https://docs.perplexity.ai/guides/pricing#detailed-pricing-breakdown-for-sonar-deep-research))\
        \ \n- Input tokens comprise of Prompt tokens (user prompt) + Citation tokens\
        \ (these are processed tokens from running searches)\n- Deep Research runs\
        \ multiple searches to conduct exhaustive research. Searches are priced at\
        \ $5/1000 searches. A request that does 30 searches will cost $0.15 in this\
        \ step.\n- Reasoning is a distinct step in Deep Research since it does extensive\
        \ automated reasoning through all the material it gathers during its research\
        \ phase. Reasoning tokens here are a bit different than the CoTs in the answer\
        \ - these are tokens that we use to reason through the research material prior\
        \ to generating the outputs via the CoTs. Reasoning tokens are priced at $3/1M\
        \ tokens"
    perplexity/sonar-deep-research:
      citation_cost_per_token: 2.0e-06
      input_cost_per_token: 2.0e-06
      litellm_provider: openrouter
      max_input_tokens: 128000
      max_tokens: 128000
      mode: chat
      output_cost_per_reasoning_token: 3.0e-06
      output_cost_per_token: 8.0e-06
      search_context_cost_per_query: *id251
      supports_reasoning: true
      supports_web_search: true
      metadata: *id252
