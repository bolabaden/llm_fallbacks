    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 2.5e-07
    output_cost_per_token: 7.5e-07
    max_input_tokens: 128000
    max_output_tokens: 50000
    metadata: &id018
      notes: "Mercury 2 is an extremely fast reasoning LLM, and the first reasoning\
        \ diffusion LLM (dLLM).\nInstead of generating tokens sequentially, Mercury\
        \ 2 produces and refines multiple tokens in parallel, achieving >1,000 tokens/sec\
        \ on standard GPUs. Mercury 2 is 5x+ faster than leading speed-optimized LLMs\
        \ like Claude 4.5 Haiku and GPT 5 Mini, at a fraction of the cost. \nMercury\
        \ 2 supports tunable reasoning levels, 128K context, native tool use, and\
        \ schema-aligned JSON output. Built for coding workflows where latency compounds,\
        \ real-time voice/search, and agent loops. OpenAI API compatible. Read more\
        \ in the [blog post](https://www.inceptionlabs.ai/blog/introducing-mercury-2)."
    litellm_provider: openrouter
    inception/mercury-2:
      input_cost_per_token: 2.5e-07
      output_cost_per_token: 7.5e-07
      max_input_tokens: 128000
      max_output_tokens: 50000
      metadata: *id018
      litellm_provider: openrouter
