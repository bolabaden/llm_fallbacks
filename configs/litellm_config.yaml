    max_input_tokens: 131072
    max_output_tokens: 131072
    metadata: &id134
      notes: 'Tongyi DeepResearch is an agentic large language model developed by
        Tongyi Lab, with 30 billion total parameters activating only 3 billion per
        token. It''s optimized for long-horizon, deep information-seeking tasks and
        delivers state-of-the-art performance on benchmarks like Humanity''s Last
        Exam, BrowserComp, BrowserComp-ZH, WebWalkerQA, GAIA, xbench-DeepSearch, and
        FRAMES. This makes it superior for complex agentic search, reasoning, and
        multi-step problem-solving compared to prior models.


        The model includes a fully automated synthetic data pipeline for scalable
        pre-training, fine-tuning, and reinforcement learning. It uses large-scale
        continual pre-training on diverse agentic data to boost reasoning and stay
        fresh. It also features end-to-end on-policy RL with a customized Group Relative
        Policy Optimization, including token-level gradients and negative sample filtering
        for stable training. The model supports ReAct for core ability checks and
        an IterResearch-based ''Heavy'' mode for max performance through test-time
        scaling. It''s ideal for advanced research agents, tool use, and heavy inference
        workflows.'
    litellm_provider: openrouter
    alibaba/tongyi-deepresearch-30b-a3b:
      input_cost_per_token: 9.0e-08
