        reasoning tasks, particularly excelling in science, mathematics, and coding.


        This model supports the `reasoning_effort` parameter, which can be set to
        "high", "medium", or "low" to control the thinking time of the model. The
        default is "medium". OpenRouter also offers the model slug `openai/o3-mini-high`
        to default the parameter to "high".


        The model features three adjustable reasoning effort levels and supports key
        developer capabilities including function calling, structured outputs, and
        streaming, though it does not include vision processing capabilities.


        The model demonstrates significant improvements over its predecessor, with
        expert testers preferring its responses 56% of the time and noting a 39% reduction
        in major errors on complex questions. With medium reasoning effort settings,
        o3-mini matches the performance of the larger o1 model on challenging reasoning
        evaluations like AIME and GPQA, while maintaining lower latency and cost.'
