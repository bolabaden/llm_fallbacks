    model: openai/openrouter/elephant-alpha
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 262144
    max_output_tokens: 32768
    metadata: &id001
      notes: Elephant Alpha is a 100B-parameter text model focused on intelligence
        efficiency, delivering strong performance while minimizing token usage. It
        supports a 256K context window with up to 32K output tokens,...
