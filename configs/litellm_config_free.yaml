cache:
  host: localhost
  mode: default_off
  namespace: litellm.caching.caching
  port: 6379
  supported_call_types:
  - acompletion
  - atext_completion
  - aembedding
  - atranscription
  ttl: 600
  type: redis
general_settings:
  master_key: sk-1c4df6fe15c744d0bb5ee3d2a4a7bf1f
  alerting:
  - slack
  - email
  proxy_batch_write_at: 60
  database_connection_pool_limit: 10
  alerting_threshold: 0
  allow_requests_on_db_unavailable: true
  allowed_routes: []
  background_health_checks: true
  database_url: postgresql://postgres:None@localhost:5432/postgres
  disable_adding_master_key_hash_to_db: false
  disable_master_key_return: false
  disable_reset_budget: false
  disable_retry_on_max_parallel_request_limit_error: false
  disable_spend_logs: false
  enable_jwt_auth: false
  enforce_user_param: false
  global_max_parallel_requests: 0
  health_check_interval: 300
  infer_model_from_keys: true
  max_parallel_requests: 0
  use_client_credentials_pass_through_routes: false
litellm_settings:
  callbacks:
  - otel
  content_policy_fallbacks: []
  context_window_fallbacks: []
  default_fallbacks: []
  failure_callback:
  - sentry
  force_ipv4: true
  json_logs: true
  redact_user_api_key_info: true
  request_timeout: 600
  service_callbacks:
  - datadog
  - prometheus
  set_verbose: false
  turn_off_message_logging: false
model_list:
- model_name: nvidia/nemotron-3-super-120b-a12b:free
  litellm_params:
    model: openai/nvidia/nemotron-3-super-120b-a12b:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 262144
    max_output_tokens: 262144
    metadata:
      notes: "NVIDIA Nemotron 3 Super is a 120B-parameter open hybrid MoE model, activating\
        \ just 12B parameters for maximum compute efficiency and accuracy in complex\
        \ multi-agent applications. Built on a hybrid Mamba-Transformer Mixture-of-Experts\
        \ architecture with multi-token prediction (MTP), it delivers over 50% higher\
        \ token generation compared to leading open models.\n \nThe model features\
        \ a 1M token context window for long-term agent coherence, cross-document\
        \ reasoning, and multi-step task planning. Latent MoE enables calling 4 experts\
        \ for the inference cost of only one, improving intelligence and generalization.\
        \ Multi-environment RL training across 10+ environments delivers leading accuracy\
        \ on benchmarks including AIME 2025, TerminalBench, and SWE-Bench Verified.\n\
        \ \nFully open with weights, datasets, and recipes under the NVIDIA Open License,\
        \ Nemotron 3 Super allows easy customization and secure deployment anywhere\
        \ — from workstation to cloud."
    litellm_provider: openrouter
- model_name: minimax/minimax-m2.5:free
  litellm_params:
    model: openai/minimax/minimax-m2.5:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 196608
    max_output_tokens: 196608
    metadata:
      notes: MiniMax-M2.5 is a SOTA large language model designed for real-world productivity.
        Trained in a diverse range of complex real-world digital working environments,
        M2.5 builds upon the coding expertise of M2.1 to extend into general office
        work, reaching fluency in generating and operating Word, Excel, and Powerpoint
        files, context switching between diverse software environments, and working
        across different agent and human teams. Scoring 80.2% on SWE-Bench Verified,
        51.3% on Multi-SWE-Bench, and 76.3% on BrowseComp, M2.5 is also more token
        efficient than previous generations, having been trained to optimize its actions
        and output through planning.
    litellm_provider: openrouter
- model_name: openrouter/free
  litellm_params:
    model: openai/openrouter/free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    mode: chat
    supports_vision: true
    metadata:
      notes: 'The simplest way to get free inference. openrouter/free is a router
        that selects free models at random from the models available on OpenRouter.
        The router smartly filters for models that support features needed for your
        request such as image understanding, tool calling, structured outputs and
        more. '
    litellm_provider: openrouter
- model_name: stepfun/step-3.5-flash:free
  litellm_params:
    model: openai/stepfun/step-3.5-flash:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 256000
    max_output_tokens: 256000
    metadata:
      notes: Step 3.5 Flash is StepFun's most capable open-source foundation model.
        Built on a sparse Mixture of Experts (MoE) architecture, it selectively activates
        only 11B of its 196B parameters per token. It is a reasoning model that is
        incredibly speed efficient even at long contexts.
    litellm_provider: openrouter
- model_name: arcee-ai/trinity-large-preview:free
  litellm_params:
    model: openai/arcee-ai/trinity-large-preview:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    input_cost_per_image: 0.0
    input_cost_per_query: 0.0
    max_input_tokens: 131000
    metadata:
      notes: "Trinity-Large-Preview is a frontier-scale open-weight language model\
        \ from Arcee, built as a 400B-parameter sparse Mixture-of-Experts with 13B\
        \ active parameters per token using 4-of-256 expert routing. \n\nIt excels\
        \ in creative writing, storytelling, role-play, chat scenarios, and real-time\
        \ voice assistance, better than your average reasoning model usually can.\
        \ But we’re also introducing some of our newer agentic performance. It was\
        \ trained to navigate well in agent harnesses like OpenCode, Cline, and Kilo\
        \ Code, and to handle complex toolchains and long, constraint-filled prompts.\
        \ \n\nThe architecture natively supports very long context windows up to 512k\
        \ tokens, with the Preview API currently served at 128k context using 8-bit\
        \ quantization for practical deployment. Trinity-Large-Preview reflects Arcee’s\
        \ efficiency-first design philosophy, offering a production-oriented frontier\
        \ model with open weights and permissive licensing suitable for real-world\
        \ applications and experimentation."
    litellm_provider: openrouter
- model_name: liquid/lfm-2.5-1.2b-thinking:free
  litellm_params:
    model: openai/liquid/lfm-2.5-1.2b-thinking:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 32768
    metadata:
      notes: LFM2.5-1.2B-Thinking is a lightweight reasoning-focused model optimized
        for agentic tasks, data extraction, and RAG—while still running comfortably
        on edge devices. It supports long context (up to 32K tokens) and is designed
        to provide higher-quality “thinking” responses in a small 1.2B model.
    litellm_provider: openrouter
- model_name: liquid/lfm-2.5-1.2b-instruct:free
  litellm_params:
    model: openai/liquid/lfm-2.5-1.2b-instruct:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 32768
    metadata:
      notes: LFM2.5-1.2B-Instruct is a compact, high-performance instruction-tuned
        model built for fast on-device AI. It delivers strong chat quality in a 1.2B
        parameter footprint, with efficient edge inference and broad runtime support.
    litellm_provider: openrouter
- model_name: nvidia/nemotron-3-nano-30b-a3b:free
  litellm_params:
    model: openai/nvidia/nemotron-3-nano-30b-a3b:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 256000
    metadata:
      notes: 'NVIDIA Nemotron 3 Nano 30B A3B is a small language MoE model with highest
        compute efficiency and accuracy for developers to build specialized agentic
        AI systems.


        The model is fully open with open-weights, datasets and recipes so developers
        can easily

        customize, optimize, and deploy the model on their infrastructure for maximum
        privacy and

        security.'
    litellm_provider: openrouter
- model_name: openrouter/bodybuilder
  litellm_params:
    model: openai/openrouter/bodybuilder
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: -1.0
    output_cost_per_token: -1.0
    metadata:
      notes: 'Transform your natural language requests into structured OpenRouter
        API request objects. Describe what you want to accomplish with AI models,
        and Body Builder will construct the appropriate API calls. Example: "count
        to 10 using gemini and opus."


        This is useful for creating multi-model requests, custom model routers, or
        programmatic generation of API calls from human descriptions.


        **BETA NOTICE**: Body Builder is in beta, and currently free. Pricing and
        functionality may change in the future.'
    litellm_provider: openrouter
- model_name: arcee-ai/trinity-mini:free
  litellm_params:
    model: openai/arcee-ai/trinity-mini:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 131072
    metadata:
      notes: Trinity Mini is a 26B-parameter (3B active) sparse mixture-of-experts
        language model featuring 128 experts with 8 active per token. Engineered for
        efficient reasoning over long contexts (131k) with robust function calling
        and multi-step agent workflows.
    supports_function_calling: true
    litellm_provider: openrouter
- model_name: nvidia/nemotron-nano-12b-v2-vl:free
  litellm_params:
    model: openai/nvidia/nemotron-nano-12b-v2-vl:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 128000
    max_output_tokens: 128000
    metadata:
      notes: 'NVIDIA Nemotron Nano 2 VL is a 12-billion-parameter open multimodal
        reasoning model designed for video understanding and document intelligence.
        It introduces a hybrid Transformer-Mamba architecture, combining transformer-level
        accuracy with Mamba’s memory-efficient sequence modeling for significantly
        higher throughput and lower latency.


        The model supports inputs of text and multi-image documents, producing natural-language
        outputs. It is trained on high-quality NVIDIA-curated synthetic datasets optimized
        for optical-character recognition, chart reasoning, and multimodal comprehension.


        Nemotron Nano 2 VL achieves leading results on OCRBench v2 and scores ≈ 74
        average across MMMU, MathVista, AI2D, OCRBench, OCR-Reasoning, ChartQA, DocVQA,
        and Video-MME—surpassing prior open VL baselines. With Efficient Video Sampling
        (EVS), it handles long-form videos while reducing inference cost.


        Open-weights, training data, and fine-tuning recipes are released under a
        permissive NVIDIA open license, with deployment supported across NeMo, NIM,
        and major inference runtimes.'
    litellm_provider: openrouter
- model_name: qwen/qwen3-next-80b-a3b-instruct:free
  litellm_params:
    model: openai/qwen/qwen3-next-80b-a3b-instruct:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 262144
    metadata:
      notes: 'Qwen3-Next-80B-A3B-Instruct is an instruction-tuned chat model in the
        Qwen3-Next series optimized for fast, stable responses without “thinking”
        traces. It targets complex tasks across reasoning, code generation, knowledge
        QA, and multilingual use, while remaining robust on alignment and formatting.
        Compared with prior Qwen3 instruct variants, it focuses on higher throughput
        and stability on ultra-long inputs and multi-turn dialogues, making it well-suited
        for RAG, tool use, and agentic workflows that require consistent final answers
        rather than visible chain-of-thought.


        The model employs scaling-efficient training and decoding to improve parameter
        efficiency and inference speed, and has been validated on a broad set of public
        benchmarks where it reaches or approaches larger Qwen3 systems in several
        categories while outperforming earlier mid-sized baselines. It is best used
        as a general assistant, code helper, and long-context task solver in production
        settings where deterministic, instruction-following outputs are preferred.'
    litellm_provider: openrouter
- model_name: nvidia/nemotron-nano-9b-v2:free
  litellm_params:
    model: openai/nvidia/nemotron-nano-9b-v2:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 128000
    metadata:
      notes: "NVIDIA-Nemotron-Nano-9B-v2 is a large language model (LLM) trained from\
        \ scratch by NVIDIA, and designed as a unified model for both reasoning and\
        \ non-reasoning tasks. It responds to user queries and tasks by first generating\
        \ a reasoning trace and then concluding with a final response. \n\nThe model's\
        \ reasoning capabilities can be controlled via a system prompt. If the user\
        \ prefers the model to provide its final answer without intermediate reasoning\
        \ traces, it can be configured to do so."
    litellm_provider: openrouter
- model_name: openai/gpt-oss-120b:free
  litellm_params:
    model: openai/gpt-oss-120b:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 131072
    max_output_tokens: 131072
    metadata:
      notes: gpt-oss-120b is an open-weight, 117B-parameter Mixture-of-Experts (MoE)
        language model from OpenAI designed for high-reasoning, agentic, and general-purpose
        production use cases. It activates 5.1B parameters per forward pass and is
        optimized to run on a single H100 GPU with native MXFP4 quantization. The
        model supports configurable reasoning depth, full chain-of-thought access,
        and native tool use, including function calling, browsing, and structured
        output generation.
    supports_function_calling: true
    litellm_provider: openrouter
- model_name: openai/gpt-oss-20b:free
  litellm_params:
    model: openai/gpt-oss-20b:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 131072
    max_output_tokens: 131072
    metadata:
      notes: gpt-oss-20b is an open-weight 21B parameter model released by OpenAI
        under the Apache 2.0 license. It uses a Mixture-of-Experts (MoE) architecture
        with 3.6B active parameters per forward pass, optimized for lower-latency
        inference and deployability on consumer or single-GPU hardware. The model
        is trained in OpenAI’s Harmony response format and supports reasoning level
        configuration, fine-tuning, and agentic capabilities including function calling,
        tool use, and structured outputs.
    supports_function_calling: true
    litellm_provider: openrouter
- model_name: z-ai/glm-4.5-air:free
  litellm_params:
    model: openai/z-ai/glm-4.5-air:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 131072
    max_output_tokens: 96000
    metadata:
      notes: GLM-4.5-Air is the lightweight variant of our latest flagship model family,
        also purpose-built for agent-centric applications. Like GLM-4.5, it adopts
        the Mixture-of-Experts (MoE) architecture but with a more compact parameter
        size. GLM-4.5-Air also supports hybrid inference modes, offering a "thinking
        mode" for advanced reasoning and tool use, and a "non-thinking mode" for real-time
        interaction. Users can control the reasoning behaviour with the `reasoning`
        `enabled` boolean. [Learn more in our docs](https://openrouter.ai/docs/use-cases/reasoning-tokens#enable-reasoning-with-default-config)
    litellm_provider: openrouter
- model_name: qwen/qwen3-coder:free
  litellm_params:
    model: openai/qwen/qwen3-coder:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 262000
    max_output_tokens: 262000
    metadata:
      notes: 'Qwen3-Coder-480B-A35B-Instruct is a Mixture-of-Experts (MoE) code generation
        model developed by the Qwen team. It is optimized for agentic coding tasks
        such as function calling, tool use, and long-context reasoning over repositories.
        The model features 480 billion total parameters, with 35 billion active per
        forward pass (8 out of 160 experts).


        Pricing for the Alibaba endpoints varies by context length. Once a request
        is greater than 128k input tokens, the higher pricing is used.'
    supports_function_calling: true
    litellm_provider: openrouter
- model_name: cognitivecomputations/dolphin-mistral-24b-venice-edition:free
  litellm_params:
    model: openai/cognitivecomputations/dolphin-mistral-24b-venice-edition:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 32768
    metadata:
      notes: Venice Uncensored Dolphin Mistral 24B Venice Edition is a fine-tuned
        variant of Mistral-Small-24B-Instruct-2501, developed by dphn.ai in collaboration
        with Venice.ai. This model is designed as an “uncensored” instruct-tuned LLM,
        preserving user control over alignment, system prompts, and behavior. Intended
        for advanced and unrestricted use cases, Venice Uncensored emphasizes steerability
        and transparent behavior, removing default safety and alignment layers typically
        found in mainstream assistant models.
    litellm_provider: openrouter
- model_name: google/gemma-3n-e2b-it:free
  litellm_params:
    model: openai/google/gemma-3n-e2b-it:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 8192
    max_output_tokens: 2048
    metadata:
      notes: Gemma 3n E2B IT is a multimodal, instruction-tuned model developed by
        Google DeepMind, designed to operate efficiently at an effective parameter
        size of 2B while leveraging a 6B architecture. Based on the MatFormer architecture,
        it supports nested submodels and modular composition via the Mix-and-Match
        framework. Gemma 3n models are optimized for low-resource deployment, offering
        32K context length and strong multilingual and reasoning performance across
        common benchmarks. This variant is trained on a diverse corpus including code,
        math, web, and multimodal data.
    litellm_provider: openrouter
- model_name: google/gemma-3n-e4b-it:free
  litellm_params:
    model: openai/google/gemma-3n-e4b-it:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 8192
    max_output_tokens: 2048
    metadata:
      notes: 'Gemma 3n E4B-it is optimized for efficient execution on mobile and low-resource
        devices, such as phones, laptops, and tablets. It supports multimodal inputs—including
        text, visual data, and audio—enabling diverse tasks such as text generation,
        speech recognition, translation, and image analysis. Leveraging innovations
        like Per-Layer Embedding (PLE) caching and the MatFormer architecture, Gemma
        3n dynamically manages memory usage and computational load by selectively
        activating model parameters, significantly reducing runtime resource requirements.


        This model supports a wide linguistic range (trained in over 140 languages)
        and features a flexible 32K token context window. Gemma 3n can selectively
        load parameters, optimizing memory and computational efficiency based on the
        task or device capabilities, making it well-suited for privacy-focused, offline-capable
        applications and on-device AI solutions. [Read more in the blog post](https://developers.googleblog.com/en/introducing-gemma-3n/)'
    litellm_provider: openrouter
- model_name: qwen/qwen3-4b:free
  litellm_params:
    model: openai/qwen/qwen3-4b:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 40960
    metadata:
      notes: Qwen3-4B is a 4 billion parameter dense language model from the Qwen3
        series, designed to support both general-purpose and reasoning-intensive tasks.
        It introduces a dual-mode architecture—thinking and non-thinking—allowing
        dynamic switching between high-precision logical reasoning and efficient dialogue
        generation. This makes it well-suited for multi-turn chat, instruction following,
        and complex agent workflows.
    litellm_provider: openrouter
- model_name: mistralai/mistral-small-3.1-24b-instruct:free
  litellm_params:
    model: openai/mistralai/mistral-small-3.1-24b-instruct:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 128000
    mode: chat
    supports_vision: true
    metadata:
      notes: Mistral Small 3.1 24B Instruct is an upgraded variant of Mistral Small
        3 (2501), featuring 24 billion parameters with advanced multimodal capabilities.
        It provides state-of-the-art performance in text-based reasoning and vision
        tasks, including image analysis, programming, mathematical reasoning, and
        multilingual support across dozens of languages. Equipped with an extensive
        128k token context window and optimized for efficient local inference, it
        supports use cases such as conversational agents, function calling, long-document
        comprehension, and privacy-sensitive deployments. The updated version is [Mistral
        Small 3.2](mistralai/mistral-small-3.2-24b-instruct)
    supports_function_calling: true
    litellm_provider: openrouter
- model_name: google/gemma-3-4b-it:free
  litellm_params:
    model: openai/google/gemma-3-4b-it:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 32768
    max_output_tokens: 8192
    mode: chat
    supports_vision: true
    metadata:
      notes: Gemma 3 introduces multimodality, supporting vision-language input and
        text outputs. It handles context windows up to 128k tokens, understands over
        140 languages, and offers improved math, reasoning, and chat capabilities,
        including structured outputs and function calling.
    supports_function_calling: true
    litellm_provider: openrouter
- model_name: google/gemma-3-12b-it:free
  litellm_params:
    model: openai/google/gemma-3-12b-it:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 32768
    max_output_tokens: 8192
    mode: chat
    supports_vision: true
    metadata:
      notes: Gemma 3 introduces multimodality, supporting vision-language input and
        text outputs. It handles context windows up to 128k tokens, understands over
        140 languages, and offers improved math, reasoning, and chat capabilities,
        including structured outputs and function calling. Gemma 3 12B is the second
        largest in the family of Gemma 3 models after [Gemma 3 27B](google/gemma-3-27b-it)
    supports_function_calling: true
    litellm_provider: openrouter
- model_name: google/gemma-3-27b-it:free
  litellm_params:
    model: openai/google/gemma-3-27b-it:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 131072
    max_output_tokens: 8192
    mode: chat
    supports_vision: true
    metadata:
      notes: Gemma 3 introduces multimodality, supporting vision-language input and
        text outputs. It handles context windows up to 128k tokens, understands over
        140 languages, and offers improved math, reasoning, and chat capabilities,
        including structured outputs and function calling. Gemma 3 27B is Google's
        latest open source model, successor to [Gemma 2](google/gemma-2-27b-it)
    supports_function_calling: true
    litellm_provider: openrouter
- model_name: meta-llama/llama-3.3-70b-instruct:free
  litellm_params:
    model: openai/meta-llama/llama-3.3-70b-instruct:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 65536
    metadata:
      notes: 'The Meta Llama 3.3 multilingual large language model (LLM) is a pretrained
        and instruction tuned generative model in 70B (text in/text out). The Llama
        3.3 instruction tuned text only model is optimized for multilingual dialogue
        use cases and outperforms many of the available open source and closed chat
        models on common industry benchmarks.


        Supported languages: English, German, French, Italian, Portuguese, Hindi,
        Spanish, and Thai.


        [Model Card](https://github.com/meta-llama/llama-models/blob/main/models/llama3_3/MODEL_CARD.md)'
    litellm_provider: openrouter
- model_name: meta-llama/llama-3.2-3b-instruct:free
  litellm_params:
    model: openai/meta-llama/llama-3.2-3b-instruct:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 131072
    metadata:
      notes: 'Llama 3.2 3B is a 3-billion-parameter multilingual large language model,
        optimized for advanced natural language processing tasks like dialogue generation,
        reasoning, and summarization. Designed with the latest transformer architecture,
        it supports eight languages, including English, Spanish, and Hindi, and is
        adaptable for additional languages.


        Trained on 9 trillion tokens, the Llama 3.2 3B model excels in instruction-following,
        complex reasoning, and tool use. Its balanced performance makes it ideal for
        applications needing accuracy and efficiency in text generation across multilingual
        settings.


        Click here for the [original model card](https://github.com/meta-llama/llama-models/blob/main/models/llama3_2/MODEL_CARD.md).


        Usage of this model is subject to [Meta''s Acceptable Use Policy](https://www.llama.com/llama3/use-policy/).'
    litellm_provider: openrouter
- model_name: nousresearch/hermes-3-llama-3.1-405b:free
  litellm_params:
    model: openai/nousresearch/hermes-3-llama-3.1-405b:free
    api_base: https://openrouter.ai/api/v1
    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 131072
    metadata:
      notes: 'Hermes 3 is a generalist language model with many improvements over
        Hermes 2, including advanced agentic capabilities, much better roleplaying,
        reasoning, multi-turn conversation, long context coherence, and improvements
        across the board.


        Hermes 3 405B is a frontier-level, full-parameter finetune of the Llama-3.1
        405B foundation model, focused on aligning LLMs to the user, with powerful
        steering capabilities and control given to the end user.


        The Hermes 3 series builds and expands on the Hermes 2 set of capabilities,
        including more powerful and reliable function calling and structured output
        capabilities, generalist assistant capabilities, and improved code generation
        skills.


        Hermes 3 is competitive, if not superior, to Llama-3.1 Instruct models at
        general capabilities, with varying strengths and weaknesses attributable between
        the two.'
    supports_function_calling: true
    litellm_provider: openrouter
